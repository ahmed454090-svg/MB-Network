<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>FTCF | Professional Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400&display=swap');
        body { background-color: #050505; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        
        #splash { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s ease-in-out; }
        .circle-logo { width: 120px; height: 120px; border: 4px solid transparent; border-top: 4px solid #f59e0b; border-bottom: 4px solid #f59e0b; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; font-weight: 800; color: #f59e0b; animation: rotate 2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .typing-text { font-family: 'JetBrains Mono', monospace; color: #fbbf24; margin-top: 25px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.2em; overflow: hidden; border-right: 2px solid #fbbf24; white-space: nowrap; animation: typing 2.5s steps(30, end), blink 0.75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 20ch } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #fbbf24 } }
        
        .tab-content { display: none; height: 100vh; }
        .tab-content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); padding: 10px 25px; }
        .tab-btn { transition: all 0.3s ease; color: #64748b; }
        .tab-btn.active-tab { color: #f59e0b !important; transform: scale(1.1); }
        .glass-card { background: rgba(15, 15, 15, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="text-slate-200">

    <div id="splash">
        <div class="circle-logo">FTCF</div>
        <div class="typing-text">Mughal Brothers Network</div>
    </div>

    <!-- Top Right Icons -->
    <div class="fixed top-6 right-6 z-[60] flex gap-2">
        <button id="installBtn" class="hidden w-9 h-9 rounded-full bg-amber-500/20 border border-amber-500/50 text-amber-500"><i class="fas fa-download"></i></button>
        <button onclick="document.getElementById('bank-popup').classList.remove('hidden')" class="w-9 h-9 rounded-full bg-white/5 border border-white/10 text-blue-400 hover:bg-blue-500/10 transition-all"><i class="fas fa-university"></i></button>
        <button onclick="document.getElementById('notice-popup').classList.remove('hidden')" class="w-9 h-9 rounded-full bg-white/5 border border-white/10 text-amber-500 hover:bg-amber-500/10 transition-all"><i class="fas fa-bell"></i></button>
    </div>

    <!-- Bank Details Popup -->
    <div id="bank-popup" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="glass-card p-8 rounded-3xl w-full max-w-sm text-center">
            <h2 class="text-white text-xl font-bold mb-4">🏦 Bank Details</h2>
            <div class="bg-black/30 p-4 rounded-xl text-left border border-white/5 mb-6">
                <p class="text-xs text-slate-500">Account Name: <span class="text-white">Afzaal Ahmed</span></p>
                <p class="text-xs text-slate-500 mt-2">Account No: <span class="text-white">0342-2735966</span></p>
            </div>
            <button onclick="document.getElementById('bank-popup').classList.add('hidden')" class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-xl text-white font-bold">Close</button>
        </div>
    </div>

    <!-- System Notice Popup -->
    <div id="notice-popup" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
        <div class="glass-card p-8 rounded-3xl w-full max-w-sm shadow-2xl">
            <h2 class="text-white text-xl font-bold mb-4">📢 System Notice</h2>
            <p class="text-slate-400 text-sm leading-relaxed mb-6">Alhamdulillah! App Ready hai Tamam bhaio tasali se check kar k Review Dayn.</p>
            <button onclick="document.getElementById('notice-popup').classList.add('hidden')" class="w-full py-3 bg-amber-500 hover:bg-amber-600 rounded-xl text-black font-bold transition-all">Close</button>
        </div>
    </div>

    <!-- Tabs Content -->
    <div id="ledger" class="tab-content"><iframe src="https://ftcf20-hub.github.io/FTCF.com/"></iframe></div>
    <div id="monthly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Monthly-Status/"></iframe></div>
    <div id="yearly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Yearly-Record/"></iframe></div>
    <div id="rules" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Loneportal/"></iframe></div>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-nav rounded-full flex gap-6 items-center z-50 h-16 px-6">
        <button onclick="switchTab('ledger', this)" class="tab-btn"><i class="fas fa-wallet text-xl"></i></button>
        <button onclick="switchTab('monthly', this)" class="tab-btn"><i class="fas fa-calendar-check text-xl"></i></button>
        
        <!-- Big Center WhatsApp Button -->
        <a href="https://chat.whatsapp.com/KuEfcgvGkOQHFY03h4IuHV?s=cl&p=a&ilr=1&amv=3" target="_blank" 
           class="bg-[#25d366] text-white w-14 h-14 flex items-center justify-center rounded-full shadow-[0_0_15px_rgba(37,211,102,0.5)] -mt-12 border-4 border-[#050505] hover:scale-105 transition-all">
            <i class="fab fa-whatsapp text-2xl"></i>
        </a>

        <button onclick="switchTab('yearly', this)" class="tab-btn"><i class="fas fa-chart-line text-xl"></i></button>
        <button onclick="switchTab('rules', this)" class="tab-btn"><i class="fas fa-gavel text-xl"></i></button>
    </nav>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').classList.remove('hidden'); });
        document.getElementById('installBtn').addEventListener('click', () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then((choiceResult) => { if (choiceResult.outcome === 'accepted') document.getElementById('installBtn').classList.add('hidden'); }); } });
        window.addEventListener('load', () => { setTimeout(() => { document.getElementById('splash').style.opacity = '0'; }, 2000); setTimeout(() => { document.getElementById('splash').remove(); }, 3000); const lastTab = localStorage.getItem('activeTab') || 'ledger'; const btn = document.querySelector(`button[onclick*="${lastTab}"]`); switchTab(lastTab, btn); });
        function switchTab(id, btn) { if (navigator.vibrate) navigator.vibrate(20); document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab')); document.getElementById(id).classList.add('active'); btn.classList.add('active-tab'); localStorage.setItem('activeTab', id); }
    </script>
</body>
</html>
