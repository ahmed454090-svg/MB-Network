<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>FTCF | Premium Portal</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Z51LL5bJ/1784352615032.png">
    <link rel="icon" href="https://i.postimg.cc/Z51LL5bJ/1784352615032.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #050505; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; margin: 0; }
        
        #splash { position: fixed; inset: 0; background: #050505; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 1s ease; }
        .splash-logo { animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
        .fade-out { opacity: 0; visibility: hidden; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-card { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn.active-tab { color: #f59e0b !important; transform: translateY(-5px); }
        .tab-content { display: none; height: 100vh; position: relative; }
        .tab-content.active { display: block; }
        
        /* Spinner for Iframes */
        .loader { border: 3px solid rgba(245, 158, 11, 0.3); border-top: 3px solid #f59e0b; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-200">

    <div id="splash">
        <div class="splash-logo text-amber-500 text-6xl font-black tracking-tighter mb-2">FTCF</div>
        <p class="text-slate-500 text-[10px] font-bold tracking-[0.4em] uppercase">Mughal Brothers Network</p>
    </div>

    <!-- Top Icons -->
    <div class="fixed top-6 right-6 z-[60] flex gap-3">
        <a href="https://wa.me/923000000000" target="_blank" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-green-500 hover:bg-green-500/10">
            <i class="fab fa-whatsapp"></i>
        </a>
        <button onclick="document.getElementById('notice-popup').classList.remove('hidden')" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-amber-500 hover:bg-amber-500/10">
            <i class="fas fa-bell"></i>
        </button>
    </div>

    <!-- Offline Notification -->
    <div id="offline-toast" class="hidden fixed top-20 w-full text-center z-[100]">
        <span class="bg-red-500 text-white px-4 py-1 rounded-full text-xs font-bold">Offline: Check Connection</span>
    </div>

    <div id="notice-popup" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-6 bg-black/60 backdrop-blur-md">
        <div class="glass-card p-8 rounded-3xl w-full max-w-sm">
            <h2 class="text-white text-xl font-bold mb-4">📢 System Notice</h2>
            <p class="text-slate-400 text-sm mb-6">App updated with new features. Alhamdulillah!</p>
            <button onclick="document.getElementById('notice-popup').classList.add('hidden')" class="w-full py-3 bg-amber-500 rounded-xl text-black font-bold">Close</button>
        </div>
    </div>

    <div id="ledger" class="tab-content"><iframe src="https://ftcf20-hub.github.io/FTCF.com/"></iframe></div>
    <div id="monthly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Monthly-Status/"></iframe></div>
    <div id="yearly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Yearly-Record/"></iframe></div>
    <div id="rules" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Loneportal/"></iframe></div>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-nav rounded-full px-8 py-4 flex gap-8 items-center z-50">
        <button onclick="switchTab('ledger', this)" class="tab-btn text-slate-500"><i class="fas fa-wallet text-xl"></i></button>
        <button onclick="switchTab('monthly', this)" class="tab-btn text-slate-500"><i class="fas fa-calendar-check text-xl"></i></button>
        <button onclick="switchTab('yearly', this)" class="tab-btn text-slate-500"><i class="fas fa-chart-line text-xl"></i></button>
        <button onclick="switchTab('rules', this)" class="tab-btn text-slate-500"><i class="fas fa-gavel text-xl"></i></button>
    </nav>

    <script>
        // 1. Splash Screen & Service Worker
        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('splash').classList.add('fade-out'), 2000);
            
            // 2. Load Last Tab
            const savedTab = localStorage.getItem('activeTab') || 'ledger';
            const savedBtn = document.querySelector(`button[onclick*="${savedTab}"]`);
            switchTab(savedTab, savedBtn);
        });

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

        // 3. Tab Switching with Haptic & Memory
        function switchTab(id, btn) {
            if (navigator.vibrate) navigator.vibrate(50);
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-tab');
            localStorage.setItem('activeTab', id);
        }

        // 4. Offline Detection
        window.addEventListener('offline', () => document.getElementById('offline-toast').classList.remove('hidden'));
        window.addEventListener('online', () => document.getElementById('offline-toast').classList.add('hidden'));
    </script>
</body>
</html>
