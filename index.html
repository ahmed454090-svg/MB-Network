<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FTCF | Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
        
        body { background: #0a0a0a; font-family: 'Inter', sans-serif; height: 100dvh; margin: 0; overflow: hidden; }
        
        /* Clean Iframe */
        .tab-content { display: none; height: 100dvh; width: 100%; }
        .tab-content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Minimal Luxury Nav */
        .luxury-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 10px 25px;
            border-radius: 50px;
            display: flex; gap: 30px;
            border: 0.5px solid rgba(255, 255, 255, 0.05);
        }
        
        .nav-icon { color: #525252; transition: all 0.4s ease; font-size: 18px; }
        .nav-icon.active { color: #d4af37; transform: translateY(-2px); }
        
        #splash { background: #0a0a0a; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="splash" class="fixed inset-0 z-[999] transition-opacity duration-1000">
        <div class="text-[12px] tracking-[0.5em] uppercase text-zinc-500 font-light">FTCF Portal</div>
    </div>

    <div id="ledger" class="tab-content active"><iframe src="https://ftcf20-hub.github.io/FTCF.com/"></iframe></div>
    <div id="monthly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Monthly-Status/"></iframe></div>
    <div id="yearly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Yearly-Record/"></iframe></div>
    <div id="rules" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Loneportal/"></iframe></div>

    <nav class="luxury-nav">
        <button onclick="switchTab('ledger', this)" class="nav-icon active"><i class="fas fa-circle-notch"></i></button>
        <button onclick="switchTab('monthly', this)" class="nav-icon"><i class="fas fa-calendar"></i></button>
        <button onclick="switchTab('yearly', this)" class="nav-icon"><i class="fas fa-chart-line"></i></button>
        <button onclick="switchTab('rules', this)" class="nav-icon"><i class="fas fa-info-circle"></i></button>
    </nav>

    <script>
        window.addEventListener('load', () => setTimeout(() => document.getElementById('splash').style.opacity = '0', 800));
        setTimeout(() => document.getElementById('splash').remove(), 1800);

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            localStorage.setItem('activeTab', id);
        }

        const savedTab = localStorage.getItem('activeTab') || 'ledger';
        switchTab(savedTab, document.querySelector(`button[onclick*="${savedTab}"]`));
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
</body>
</html>
