<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#050505">
    <title>FTCF | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { --bg-color: #050505; --accent: #f59e0b; }
        
        body { 
            background-color: var(--bg-color); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0;
            height: 100dvh; /* Dynamic Height */
            overflow: hidden;
            overscroll-behavior: none;
        }

        /* Iframe Container Fix */
        .tab-content { 
            display: none; 
            height: calc(100dvh - 80px); /* Adjust for bottom nav */
            width: 100%;
        }
        .tab-content.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Smooth Nav */
        .glass-nav { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .tab-btn { transition: all 0.3s ease; color: #64748b; }
        .active-tab { color: var(--accent) !important; transform: scale(1.1); }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash" class="fixed inset-0 bg-[#050505] z-[999] flex flex-col justify-center items-center transition-opacity duration-700">
        <div class="text-amber-500 text-5xl font-black tracking-tighter">FTCF</div>
    </div>

    <!-- Main Content Area -->
    <main class="h-[calc(100dvh-80px)] w-full">
        <div id="ledger" class="tab-content"><iframe src="https://ftcf20-hub.github.io/FTCF.com/"></iframe></div>
        <div id="monthly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Monthly-Status/"></iframe></div>
        <div id="yearly" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Yearly-Record/"></iframe></div>
        <div id="rules" class="tab-content"><iframe src="https://ftcf20-hub.github.io/Loneportal/"></iframe></div>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 w-full glass-nav px-6 py-4 flex justify-between items-center z-[50]">
        <button onclick="switchTab('ledger', this)" class="tab-btn"><i class="fas fa-wallet text-xl"></i></button>
        <button onclick="switchTab('monthly', this)" class="tab-btn"><i class="fas fa-calendar-check text-xl"></i></button>
        <button onclick="switchTab('yearly', this)" class="tab-btn"><i class="fas fa-chart-line text-xl"></i></button>
        <button onclick="switchTab('rules', this)" class="tab-btn"><i class="fas fa-gavel text-xl"></i></button>
    </nav>

    <script>
        // Splash logic
        window.addEventListener('load', () => setTimeout(() => document.getElementById('splash').style.opacity = '0', 1500));
        setTimeout(() => document.getElementById('splash').remove(), 2200);

        function switchTab(id, btn) {
            if (navigator.vibrate) navigator.vibrate(20);
            
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            
            document.getElementById(id).classList.add('active');
            btn.classList.add('active-tab');
            localStorage.setItem('activeTab', id);
        }

        // Initialize
        const savedTab = localStorage.getItem('activeTab') || 'ledger';
        const btn = document.querySelector(`button[onclick*="${savedTab}"]`);
        switchTab(savedTab, btn);
    </script>
</body>
</html>
